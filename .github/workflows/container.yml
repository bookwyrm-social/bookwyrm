name: Container building for release

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag for build results"
        type: string
        default: manual
        required: true

jobs:
  build:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read # for checkout
      packages: write # to upload build to GHCR
      id-token: write # signing attestations with github oidc token
    with:
      output: image
      push: ${{ github.event_name != 'pull_request' }}
      context: .
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      fail-fast: true
      sbom: true
      meta-images: ghcr.io/${{ github.repository_owner }}/bookwyrm
      meta-tags: |
        type=raw,value=${{ inputs.tag }},event=workflow_dispatch
        type=semver,pattern=v{{version}}
        type=ref,event=branch
      set-meta-labels: true
      set-meta-annotations: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
