name: dev-wyrm
services:
  nginx:
    env_file: .env.dev
  web:
    env_file: .env.dev
    image: ghcr.io/bookwyrm-social/bookwyrm:main
    build: .
    volumes:
      - .:/app
  db-backup-job: !reset null
  celery_worker:
    env_file: .env.dev
    image: ghcr.io/bookwyrm-social/bookwyrm:main
    volumes:
      - .:/app
  celery_beat:
    image: ghcr.io/bookwyrm-social/bookwyrm:main
    env_file: .env.dev
    volumes:
      - .:/app
  flower:
    image: ghcr.io/bookwyrm-social/bookwyrm:main
    env_file: .env.dev
    volumes:
      - .:/app
  dev-tools:
    image: ghcr.io/bookwyrm-social/bookwyrm-dev-tools:main
    build: dev-tools
    env_file:
      - .env
      - .env.dev
    networks:
      - main
    volumes:
      - /app/dev-tools/
      - .:/app
    profiles:
      - tools
